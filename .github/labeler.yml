# PR auto-labeler — assigns layer labels based on changed files.
# Used by .github/workflows/label-layers.yml (actions/labeler@v5).
# See docs/architecture/Koi.md for layer definitions.
#
# ⚠️  AUTO-GENERATED — do not edit by hand.
# Source of truth: scripts/layers.ts (L0U_PACKAGES, L3_PACKAGES)
# To regenerate: bun scripts/generate-layer-docs.ts
# To verify in CI: bun scripts/check-doc-sync.ts

"layer:L0":
  - changed-files:
    - any-glob-to-any-file: "packages/kernel/core/**"

"layer:L1":
  - changed-files:
    - any-glob-to-any-file: "packages/kernel/engine/**"

"layer:L0u":
  - changed-files:
    - any-glob-to-any-file:
      - "packages/**/bash-ast/**"
      - "packages/**/bash-security/**"
      - "packages/**/channel-base/**"
      - "packages/**/config/**"
      - "packages/**/context-manager/**"
      - "packages/**/edit-match/**"
      - "packages/**/errors/**"
      - "packages/**/event-delivery/**"
      - "packages/**/execution-context/**"
      - "packages/**/file-resolution/**"
      - "packages/**/git-utils/**"
      - "packages/**/hash/**"
      - "packages/**/hook-prompt/**"
      - "packages/**/redaction/**"
      - "packages/**/rules-loader/**"
      - "packages/**/secure-storage/**"
      - "packages/**/session-repair/**"
      - "packages/**/shutdown/**"
      - "packages/**/skill-scanner/**"
      - "packages/**/task-board/**"
      - "packages/**/test/**"
      - "packages/**/token-estimator/**"
      - "packages/**/tools-core/**"
      - "packages/**/validation/**"

"layer:L3":
  - changed-files:
    - any-glob-to-any-file:
      - "packages/**/agent/cli/**"
      - "packages/**/cli/**"
      - "packages/**/runtime/**"

# L2 is the catch-all: any package change that is not L0, L1, L0u, or L3.
# The negation patterns prevent L0/L1/L0u/L3 package changes from also triggering L2.
"layer:L2":
  - changed-files:
    - any-glob-to-any-file:
      - "packages/**"
      - "!packages/**/agent/cli/**"
      - "!packages/**/bash-ast/**"
      - "!packages/**/bash-security/**"
      - "!packages/**/channel-base/**"
      - "!packages/**/cli/**"
      - "!packages/**/config/**"
      - "!packages/**/context-manager/**"
      - "!packages/**/core/**"
      - "!packages/**/edit-match/**"
      - "!packages/**/engine/**"
      - "!packages/**/errors/**"
      - "!packages/**/event-delivery/**"
      - "!packages/**/execution-context/**"
      - "!packages/**/file-resolution/**"
      - "!packages/**/git-utils/**"
      - "!packages/**/hash/**"
      - "!packages/**/hook-prompt/**"
      - "!packages/**/redaction/**"
      - "!packages/**/rules-loader/**"
      - "!packages/**/runtime/**"
      - "!packages/**/secure-storage/**"
      - "!packages/**/session-repair/**"
      - "!packages/**/shutdown/**"
      - "!packages/**/skill-scanner/**"
      - "!packages/**/task-board/**"
      - "!packages/**/test/**"
      - "!packages/**/token-estimator/**"
      - "!packages/**/tools-core/**"
      - "!packages/**/validation/**"
