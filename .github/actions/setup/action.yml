name: Setup Bun & Turborepo
description: Install Bun, restore caches, and install dependencies. Requires checkout first.

runs:
  using: composite
  steps:
    # Bun version is pinned (not "latest") because the startup-latency gate
    # (#1637) compares against a baseline recorded under a specific Bun
    # version — patch releases can shift startup cost. Keep in sync with
    # the `packageManager` field in root package.json. Update via a
    # dedicated PR that also refreshes bench/startup-baseline.json.
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: ${{ runner.os }}-bun-

    - name: Turborepo cache
      uses: rharkor/caching-for-turbo@v2.3.11

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
