name: Label PR by layer

# Uses `pull_request_target` so the workflow has `pull-requests: write` on
# fork PRs (the default `pull_request` token from forks is read-only and
# the labeler then fails with "Resource not accessible by integration").
#
# SAFETY: this workflow never checks out or executes PR-controlled code.
# It only invokes `actions/labeler`, which reads `.github/labeler.yml`
# from the BASE branch (main) and applies labels via the API. PR content
# cannot influence what runs here, so the usual `pull_request_target`
# code-execution risk does not apply.
on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  label:
    name: Assign layer labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Pinned to commit SHA (not tag) per GHA supply-chain security best practice.
      # SHA corresponds to actions/labeler@v5.0.0.
      # To update: check https://github.com/actions/labeler/releases for the new tag SHA.
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
