name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Lint (Biome)
        run: bun run check

      - name: Check layer boundaries
        run: bun run check:layers

      - name: Check package descriptions
        run: bun run check:descriptions

      - name: Check doc sync
        run: bun run check:doc-sync

      - name: Check orphaned L2 packages
        run: bun run check:orphans

      - name: Check unused code (knip)
        run: bun run check:unused

      - name: Check code duplication (jscpd)
        run: bun run check:duplicates

      - name: Check doc gate
        run: bun run check:doc-gate

      - name: Check complexity
        run: bun run check:complexity

      - name: Check test integrity
        if: github.event_name == 'pull_request'
        run: bun run check:test-integrity

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
