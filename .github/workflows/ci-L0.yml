name: CI (L0 — full suite)
# Triggered when the interfaces-only kernel or governance scripts change.
# L0 changes have the highest blast radius — all 150+ packages depend on @koi/core.
# Runs the full monorepo build + test suite (no --filter scoping).
# Requires CODEOWNERS approval (see .github/CODEOWNERS).
on:
  push:
    branches: [main]
    paths:
      - "packages/kernel/core/**"
      - "scripts/layers.ts"
      - "scripts/check-layers.ts"
      - "scripts/check-doc-sync.ts"
      - "scripts/generate-layer-docs.ts"
  pull_request:
    branches: [main]
    paths:
      - "packages/kernel/core/**"
      - "scripts/layers.ts"
      - "scripts/check-layers.ts"
      - "scripts/check-doc-sync.ts"
      - "scripts/generate-layer-docs.ts"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-l0-full:
    name: L0 — Full monorepo suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Turborepo cache
        uses: rharkor/caching-for-turbo@v2.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run check

      - name: Check layer boundaries
        run: bun run check:layers

      - name: Check doc sync
        run: bun run check:doc-sync

      - name: Build (full — no filter)
        run: bun run build

      - name: Typecheck (full — no filter)
        run: bun run typecheck

      - name: Test (full — no filter)
        run: bun run test
