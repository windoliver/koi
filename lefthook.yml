pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      run: bunx biome check --staged --no-errors-on-unmatched {staged_files}
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
      skip:
        - merge
        - rebase
    bun-test-filter:
      run: bun scripts/check-bun-test-filter.ts
      skip:
        - merge
        - rebase

pre-push:
  parallel: true
  commands:
    build:
      # Only build directly changed packages (no transitive dependents).
      # CI handles the full dependency graph.
      run: bunx turbo run build --filter='[origin/main]'
    typecheck:
      run: bunx turbo run typecheck --filter='[origin/main]'
