name: my-test
version: 0.1.0
description: A Koi agent
model: "anthropic:claude-sonnet-4-5-20250929"
preset: sqlite

# Leave nexus.url unset for local embed mode.
# Add it only when you want remote/shared Nexus.
# nexus:
#   url: https://nexus.example.com

channels:
  - name: "@koi/channel-cli"
  - name: "@koi/channel-telegram"
    options:
      token: "${TELEGRAM_BOT_TOKEN}"

tools:
  koi:
    - name: "@koi/tool-ask-user"
    - name: "@koi/tools-web"
    - name: "@koi/tools-context-hub"
    - name: "@koi/tool-exec"
    - name: "@koi/tool-browser"
    - name: "@koi/tools-github"

autonomous:
  enabled: true

stacks:
  toolStack: true
  retryStack: true
  qualityGate: true
  contextArena: true
  threadStoreBackend: sqlite
  contextHub: true
  ace: true
  aceStoreBackend: sqlite
  goalStack: true
  forge: true
  autoHarness: true
  governance: true

context:
  bootstrap: true
