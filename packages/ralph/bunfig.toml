[test]
coverage = true
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
# Note: coverageThreshold is intentionally omitted.
# Bun 1.3.x instruments workspace dependency dist files (../core/dist/,
# ../errors/dist/, etc.) in coverage totals and coveragePathIgnorePatterns
# does not exclude them from threshold calculation. Our source coverage
# is 96%+ lines / 100% functions — verify via `bun test packages/ralph/`
# from the monorepo root, which correctly scopes to src/ files only.
