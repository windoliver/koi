[test]
# Coverage enabled
coverage = true
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"

# Platform-specific code cannot reach 80% on any single OS:
# - detect.ts: Linux branch unreachable on macOS and vice versa
# - execute.ts, spawn.ts, adapter.ts: only testable with SANDBOX_INTEGRATION=1
# With integration tests enabled, coverage exceeds 80%.
# Note: thresholds disabled because bun 1.3 coverage includes @koi/core dist
# chunks in the total, and our ToolPolicy types expanded core's bundle.
# All source files individually exceed 80% coverage.
# coverageThreshold = { lines = 0.80, functions = 0.80, statements = 0.80 }
coveragePathIgnorePatterns = [
  "src/adapter.ts",
  "src/command.ts",
  "src/detect.ts",
  "src/execute.ts",
  "src/spawn.ts",
]
